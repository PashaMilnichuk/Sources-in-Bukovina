<!DOCTYPE html>
<html>
<head><meta charset="utf-8"/><title>Room</title></head>
<body>
<div>
    <select id="lang"><option value="ua">UA</option><option value="en">EN</option></select>
    <a href="rooms.html">Back to rooms</a>
    <a href="dashboard.html">Dashboard</a>
</div>

<h1 id="name"></h1>
<img id="img" style="max-width:900px; display:none;">
<pre id="info"></pre>

<h2>Book (requires login)</h2>
Check-in: <input id="ci" type="date">
Check-out: <input id="co" type="date">
<button id="btnBook">Create booking</button>
<pre id="out"></pre>

<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script>
    applyLangSelector();
    const params = new URLSearchParams(location.search);
    const id = parseInt(params.get("id") || "0", 10);

    function token(){ return localStorage.getItem("token"); }

    (async () => {
      const L = lang();
      const r = await api(`/api/rooms/${id}?lang=${L}`);
      document.title = r.name;
      document.getElementById("name").innerText = r.name;
      document.getElementById("info").innerText = JSON.stringify(r, null, 2);

      const img = document.getElementById("img");
      if (r.coverImageUrl) { img.src = r.coverImageUrl; img.style.display = "block"; }
    })();

    document.getElementById("btnBook").onclick = async () => {
      if (!token()) { location.href = "login.html"; return; }

      const ci = document.getElementById("ci").value;
      const co = document.getElementById("co").value;

      try {
        const b = await api("/api/bookings", {
          method:"POST",
          auth:true,
          body:{ roomId: id, checkIn: ci, checkOut: co }
        });
        document.getElementById("out").innerText = "Created booking #" + b.id;
      } catch (e) {
        document.getElementById("out").innerText = String(e.message || e);
      }
    };
</script>
</body>
</html>
