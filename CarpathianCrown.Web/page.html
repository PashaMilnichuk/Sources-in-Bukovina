<!DOCTYPE html>
<html>
<head><meta charset="utf-8"/><title>Page</title></head>
<body>
<div>
    <select id="lang"><option value="ua">UA</option><option value="en">EN</option></select>
    <a href="index.html">Home</a>
    <a href="rooms.html">Rooms</a>
    <a href="page.html?slug=restaurant">Restaurant</a>
    <a href="page.html?slug=services">Services</a>
    <a href="page.html?slug=contacts">Contacts</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="admin.html">Admin</a>
</div>

<h1 id="title"></h1>
<img id="hero" style="max-width:900px; display:none;">
<div id="html"></div>

<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script>
    applyLangSelector();
    const params = new URLSearchParams(location.search);
    const slug = params.get("slug") || "about";
    const L = lang();

    (async () => {
      const p = await api(`/api/content/${slug}?lang=${L}`);
      document.title = p.title;
      document.getElementById("title").innerText = p.title;

      const hero = document.getElementById("hero");
      if (p.heroImageUrl) { hero.src = p.heroImageUrl; hero.style.display = "block"; }
      document.getElementById("html").innerHTML = p.html;
    })();
</script>
</body>
</html>
