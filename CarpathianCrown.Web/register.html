<!DOCTYPE html>
<html>
<head><meta charset="utf-8"/><title>Register</title></head>
<body>
<select id="lang"><option value="ua">UA</option><option value="en">EN</option></select>
<h1>Register</h1>

<div><label>Email</label><br/><input id="email" type="email" style="width:320px;"></div>
<div><label>Login (optional)</label><br/><input id="login" type="text" style="width:320px;"></div>
<div><label>Password</label><br/><input id="password" type="password" style="width:320px;"></div>
<div><label>First name</label><br/><input id="firstName" type="text" style="width:320px;"></div>
<div><label>Last name</label><br/><input id="lastName" type="text" style="width:320px;"></div>
<div><label>Phone</label><br/><input id="phone" type="text" style="width:320px;"></div>

<button id="btn">Create account</button>
<pre id="out"></pre>

<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script>
    applyLangSelector();

    document.getElementById("btn").onclick = async () => {
      const email = document.getElementById("email").value.trim();
      const login = document.getElementById("login").value.trim() || null;
      const password = document.getElementById("password").value;
      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();
      const phone = document.getElementById("phone").value.trim();

      try {
        const res = await api("/api/auth/register", {
          method:"POST",
          body:{ email, login, password, firstName, lastName, phone }
        });

        localStorage.setItem("token", res.token);
        localStorage.setItem("role", res.role);
        localStorage.setItem("userId", String(res.userId));

        location.href = "dashboard.html";
      } catch (e) {
        document.getElementById("out").innerText = String(e.message || e);
      }
    };
</script>
</body>
</html>
